apiVersion: v1 
kind: ConfigMap
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    project: roboshop
    component: catalogue
    tier: backend
data:
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1 
kind: Deployment
metadata:
  namespace: roboshop
  name: catalogue
  labels:
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        component: catalogue
        tier: backend
    spec:
     containers:
     - name: catalogue
       image: srinunaik208/catalogue:v2 
       envFrom:
       - configMapRef:
           name: catalogue

---
apiVersion: v1 
kind: Service 
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    tier: backend
spec:
  selector:
    project: roboshop
    component: catalogue
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

     
      
        