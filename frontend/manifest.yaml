apiVersion: apps/v1 
kind: Deployment
metadata:
  namespace: roboshop
  name: frontend
  labels:
    project: roboshop
    component: frontend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        component: frontend
        tier: backend
    spec:
     containers:
     - name: frontend
       image: srinunaik208/frontend:v2 
     ports:
     - 80:80

---
apiVersion: v1 
kind: Service 
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: backend
spec:
  selector:
    project: roboshop
    component: frontend
    tier: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

     
      
        