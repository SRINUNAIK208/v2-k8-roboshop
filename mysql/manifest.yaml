apiVersion: v1
kind: Secret 
metadata:
  name: mysql 
  namespace: roboshop
  labels:
    component: mysql
    project: roboshop
    env: dev
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: "Um9ib1Nob3BAMQo="
                        




---
apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: mysql-headless
  labels:
    project: roboshop
    component: mysql 
    tier: database
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: mysql 
    tier: database
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
---
apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: mysql
  labels:
    project: roboshop
    component: mysql 
    tier: database
spec:
  selector:
    project: roboshop
    component: mysql 
    tier: database
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

---
apiVersion: apps/v1 
kind: StatefulSet
metadata:
  namespace: roboshop
  name: mysql
  labels:
    project: roboshop
    component: mysql 
    tier: database
spec:
  replicas: 1
  serviceName: mysql-headless
  selector:
    matchLabels:
      project: roboshop
      component: mysql 
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: mysql 
        tier: database
    spec:
      containers:
      - name: mysql
        image: srinunaik208/mysql:v2 
        envFrom:
        - secretRef:
            name: mysql
      ports:
        - containerPort: 3306
      