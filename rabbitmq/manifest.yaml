apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq 
    tier: database
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: "cm9ib3Nob3A="
  RABBITMQ_DEFAULT_PASS: "cm9ib3Nob3AxMjM="
---
apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq-headless
  labels:
    project: roboshop
    component: rabbitmq 
    tier: database
spec:
 clusterIP: None
 selector:
    project: roboshop
    component: rabbitmq 
    tier: database
 ports:
 - protocol: TCP
   port: 5672
   targetPort: 5672

---
apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: rabbitmq
  labels:
    project: roboshop
    component: rabbitmq 
    tier: database
spec:
 selector:
    project: roboshop
    component: rabbitmq 
    tier: database
 ports:
 - protocol: TCP
   port: 27017
   targetPort: 27017
---
apiVersion: apps/v1 
kind: StatefulSet
metadata:
  namespace: roboshop
  name: rabbitmq 
  labels:
    project: roboshop
    component: rabbitmq 
    tier: database
spec:
  replicas: 1 
  serviceName: rabbitmq-headless
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq 
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: rabbitmq 
        tier: database
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        envFrom:
        - secretRef:
            name: rabbitmq

      