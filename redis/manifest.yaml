apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: redis-headless
  labels:
    project: roboshop
    component: redis 
    tier: database
spec:
 clusterIP: None
 selector:
    project: roboshop
    component: redis 
    tier: database
 ports:
 - protocol: TCP
   port: 27017
   targetPort: 27017

---
apiVersion: v1 
kind: Service
metadata:
  namespace: roboshop
  name: redis
  labels:
    project: roboshop
    component: redis 
    tier: database
spec:
 selector:
    project: roboshop
    component: redis 
    tier: database
 ports:
 - protocol: TCP
   port: 27017
   targetPort: 27017
---
apiVersion: apps/v1 
kind: StatefulSet
metadata:
  namespace: roboshop
  name: redis 
  labels:
    project: roboshop
    component: redis 
    tier: database
spec:
  replicas: 1 
  serviceName: redis-headless
  selector:
    matchLabels:
      project: roboshop
      component: redis 
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: redis 
        tier: database
    spec:
      containers:
      - name: redis
        image: redis:7
        volumeMounts:
        - name: redis-volume
          mountPath: /data
      volumeClaimTemplates:
      - metadata:
          name: redis-volume
        spec:
          accessModes:
          - ReadWriteOnce
          StorageClassName: roboshop-sc
          resources:
           requests:
             storage: 2Gi


      