apiVersion: apps/v1 
kind: Deployment
metadata:
  namespace: roboshop
  name: shipping
  labels:
    project: roboshop
    component: shipping
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: shipping
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        component: shipping
        tier: backend
    spec:
     containers:
     - name: shipping
       image: srinunaik208/shipping:v2 

---
apiVersion: v1 
kind: Service 
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    component: shipping
    tier: backend
spec:
  selector:
    project: roboshop
    component: shipping
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

     
      
        